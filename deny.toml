[graph]
all-features = true
targets = ["x86_64-pc-windows-msvc"]

[advisories]
version = 2
yanked = "deny"
ignore = [
  { id = "RUSTSEC-2023-0071", reason = "Transitive sqlx-mysql rsa advisory has no safe upgrade; app uses local/operator MySQL connections and this remains tracked for dependency refresh." },
  { id = "RUSTSEC-2025-0075", reason = "Transitive Tauri/urlpattern Linux stack advisory has no safe upgrade in the current Tauri dependency line; Windows target remains the release target." },
  { id = "RUSTSEC-2025-0080", reason = "Transitive Tauri/urlpattern Linux stack advisory has no safe upgrade in the current Tauri dependency line; Windows target remains the release target." },
  { id = "RUSTSEC-2025-0081", reason = "Transitive Tauri/urlpattern Linux stack advisory has no safe upgrade in the current Tauri dependency line; Windows target remains the release target." },
  { id = "RUSTSEC-2025-0098", reason = "Transitive Tauri/urlpattern Linux stack advisory has no safe upgrade in the current Tauri dependency line; Windows target remains the release target." },
  { id = "RUSTSEC-2025-0100", reason = "Transitive Tauri/urlpattern Linux stack advisory has no safe upgrade in the current Tauri dependency line; Windows target remains the release target." },
]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
  "0BSD",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "OFL-1.1",
  "OpenSSL",
  "Ubuntu-font-1.0",
  "Unicode-DFS-2016",
  "Unicode-3.0",
  "Zlib",
]
exceptions = []

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
