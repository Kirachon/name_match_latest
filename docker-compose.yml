services:
  matchers-mysql:
    image: mysql:8.4
    ports:
      - "${MATCHERS_MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: duplicate_checker
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - matchers-mysql-data:/var/lib/mysql

volumes:
  matchers-mysql-data:
