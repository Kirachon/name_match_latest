name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag name (only used for manual runs)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name }}

permissions:
  contents: write

jobs:
  build_gui:
    name: Build GUI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Validate release tag
        shell: bash
        run: |
          if [[ -z "$RELEASE_TAG" ]]; then
            echo "RELEASE_TAG is required"
            exit 1
          fi
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$GITHUB_REF" != "refs/tags/$RELEASE_TAG" ]]; then
            echo "Manual release builds must be run from the same tag ref as RELEASE_TAG"
            exit 1
          fi
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+([.][0-9]+)*([-+][A-Za-z0-9._-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3"
            exit 1
          fi

      - name: Build
        run: cargo build --release --locked --bin gui

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          $safeTag = $env:RELEASE_TAG -replace '[\\/:*?"<>|]', '-'
          $out = "gui-windows-cpu-$safeTag.zip"
          Compress-Archive `
            -Path "target/release/gui.exe" `
            -DestinationPath $out `
            -Force
          "ASSET=$out" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          safe_tag="${RELEASE_TAG//\//-}"
          out="gui-linux-cpu-${safe_tag}.tar.gz"
          tar -C target/release -czf "$out" gui
          echo "ASSET=$out" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: gui-${{ runner.os }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  publish:
    name: Upload assets to GitHub Release
    runs-on: ubuntu-latest
    needs: build_gui
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
