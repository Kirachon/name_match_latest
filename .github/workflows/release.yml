name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag name (only used for manual runs)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name }}
  PNPM_VERSION: "10"
  NODE_VERSION: "20"

permissions:
  contents: write

jobs:
  build_gui:
    name: Build GUI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Validate release tag
        shell: bash
        run: |
          if [[ -z "$RELEASE_TAG" ]]; then
            echo "RELEASE_TAG is required"
            exit 1
          fi
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$GITHUB_REF" != "refs/tags/$RELEASE_TAG" ]]; then
            echo "Manual release builds must be run from the same tag ref as RELEASE_TAG"
            exit 1
          fi
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+([.][0-9]+)*([-+][A-Za-z0-9._-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3"
            exit 1
          fi

      - name: Build
        run: cargo build --release --locked --features gui --bin gui

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          $safeTag = $env:RELEASE_TAG -replace '[\\/:*?"<>|]', '-'
          $out = "gui-windows-cpu-$safeTag.zip"
          Compress-Archive `
            -Path "target/release/gui.exe" `
            -DestinationPath $out `
            -Force
          "ASSET=$out" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          safe_tag="${RELEASE_TAG//\//-}"
          out="gui-linux-cpu-${safe_tag}.tar.gz"
          tar -C target/release -czf "$out" gui
          echo "ASSET=$out" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: gui-${{ runner.os }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  build_tauri_cpu:
    name: Build Tauri CPU bundle
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Validate release tag
        shell: bash
        run: |
          if [[ -z "$RELEASE_TAG" ]]; then
            echo "RELEASE_TAG is required"
            exit 1
          fi
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" && "$GITHUB_REF" != "refs/tags/$RELEASE_TAG" ]]; then
            echo "Manual release builds must be run from the same tag ref as RELEASE_TAG"
            exit 1
          fi
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+([.][0-9]+)*([-+][A-Za-z0-9._-]+)?$ ]]; then
            echo "Release tag must look like v1.2.3"
            exit 1
          fi

      - name: Install JS deps
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Lint and test UI
        working-directory: ui
        run: |
          pnpm lint
          pnpm test

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Build Tauri CPU bundle
        working-directory: src-tauri
        run: cargo tauri build

      - name: Verify Tauri CPU bundle outputs
        shell: pwsh
        run: |
          $bundle = "src-tauri\target\release\bundle"
          $msi = Get-ChildItem $bundle -Recurse -Filter *.msi -File
          $nsis = Get-ChildItem $bundle -Recurse -Filter *.exe -File | Where-Object { $_.FullName -match '\\nsis\\' }
          if ($msi.Count -eq 0) { throw "Missing MSI bundle" }
          if ($nsis.Count -eq 0) { throw "Missing NSIS installer" }

      - uses: actions/upload-artifact@v4
        with:
          name: name-matcher-tauri-windows-cpu
          path: |
            src-tauri/target/release/name-matcher-tauri.exe
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: error

  build_tauri_gpu:
    name: Build Tauri GPU bundle
    runs-on: [self-hosted, windows, cuda]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Verify CUDA toolkit
        run: nvcc --version

      - name: Install JS deps
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Stage GPU runtime DLLs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri\target\release | Out-Null
          foreach ($pattern in @("nvrtc64_*.dll", "nvrtc-builtins64_*.dll")) {
            $matches = Get-ChildItem dist\gpu-dlls -Filter $pattern -File -ErrorAction SilentlyContinue
            if ($matches.Count -eq 0) { throw "Missing GPU runtime DLL matching $pattern" }
            $matches | ForEach-Object { Copy-Item $_.FullName src-tauri\target\release -Force }
          }

      - name: Build Tauri GPU bundle
        working-directory: src-tauri
        run: cargo tauri build --features gpu

      - name: Verify Tauri GPU artifacts
        shell: pwsh
        run: |
          foreach ($pattern in @("nvrtc64_*.dll", "nvrtc-builtins64_*.dll")) {
            $matches = Get-ChildItem src-tauri\target\release -Filter $pattern -File -ErrorAction SilentlyContinue
            if ($matches.Count -eq 0) { throw "Missing staged GPU DLL matching $pattern" }
          }
          $bundle = "src-tauri\target\release\bundle"
          $msi = Get-ChildItem $bundle -Recurse -Filter *.msi -File
          $nsis = Get-ChildItem $bundle -Recurse -Filter *.exe -File | Where-Object { $_.FullName -match '\\nsis\\' }
          if ($msi.Count -eq 0) { throw "Missing GPU MSI bundle" }
          if ($nsis.Count -eq 0) { throw "Missing GPU NSIS installer" }

      - uses: actions/upload-artifact@v4
        with:
          name: name-matcher-tauri-windows-gpu
          path: |
            src-tauri/target/release/name-matcher-tauri.exe
            src-tauri/target/release/nvrtc64_*.dll
            src-tauri/target/release/nvrtc-builtins64_*.dll
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: error

  publish:
    name: Upload assets to GitHub Release
    runs-on: ubuntu-latest
    needs: [build_gui, build_tauri_cpu, build_tauri_gpu]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
